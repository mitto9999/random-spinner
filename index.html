<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 추첨기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .app {
      display: flex;
      gap: 40px;
      align-items: center;
      padding: 40px;
    }

    /* 왼쪽: 돌림판 영역 */
    .spinner-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .wheel-container {
      position: relative;
      width: 420px;
      height: 420px;
    }

    canvas {
      width: 420px;
      height: 420px;
      filter: drop-shadow(0 0 30px rgba(100, 100, 255, 0.3));
    }

    /* 포인터 (삼각형) */
    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid #ff4757;
      filter: drop-shadow(0 2px 6px rgba(255, 71, 87, 0.6));
      z-index: 10;
      transition: transform 0.1s;
    }

    .pointer.bounce {
      animation: pointerBounce 0.15s ease;
    }

    @keyframes pointerBounce {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      50% { transform: translateX(-50%) rotate(8deg); }
    }

    .spin-btn {
      padding: 16px 60px;
      font-size: 20px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4);
      letter-spacing: 2px;
    }

    .spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(255, 71, 87, 0.6);
    }

    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .excluded-info {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    /* 추첨 필터 */
    .filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 420px;
    }

    .filter-chip {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.5);
      border-radius: 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-chip:hover {
      border-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.8);
    }

    .filter-chip.active {
      background: linear-gradient(135deg, #5f27cd, #7c3aed);
      border-color: transparent;
      color: #fff;
    }

    /* 오른쪽: 항목 관리 패널 */
    .panel {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px;
      width: 340px;
      max-height: 560px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .group-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(95, 39, 205, 0.15);
      border: 1px solid rgba(95, 39, 205, 0.3);
      border-radius: 12px;
      font-size: 13px;
    }

    .group-bar .group-icon {
      font-size: 16px;
    }

    .group-bar .group-name {
      flex: 1;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group-bar .group-action {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .group-bar .group-action:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /* 식당 추가 버튼 */
    .add-restaurant-btn {
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #5f27cd, #7c3aed);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-restaurant-btn:hover { opacity: 0.85; }

    /* 카테고리 칩 */
    .category-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      flex: 1;
      min-width: 64px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      border-radius: 18px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }

    .chip.active {
      background: linear-gradient(135deg, #5f27cd, #7c3aed);
      border-color: transparent;
      color: #fff;
    }

    .category-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
    }

    .category-badge[data-cat="한식"] { background: rgba(29, 209, 161, 0.18); color: #1dd1a1; }
    .category-badge[data-cat="중식"] { background: rgba(255, 71, 87, 0.18); color: #ff6b6b; }
    .category-badge[data-cat="일식"] { background: rgba(254, 202, 87, 0.18); color: #feca57; }
    .category-badge[data-cat="양식"] { background: rgba(84, 160, 255, 0.18); color: #54a0ff; }
    .category-badge[data-cat="분식"] { background: rgba(255, 159, 243, 0.18); color: #ff9ff3; }
    .category-badge[data-cat="기타"] { background: rgba(162, 155, 254, 0.18); color: #a29bfe; }

    .team-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
    }

    .team-badge[data-team="기획팀"] { background: rgba(84, 160, 255, 0.18); color: #54a0ff; }
    .team-badge[data-team="제작팀"] { background: rgba(29, 209, 161, 0.18); color: #1dd1a1; }
    .team-badge[data-team="컨텐츠팀"] { background: rgba(254, 202, 87, 0.18); color: #feca57; }
    .team-badge[data-team="플랫폼팀"] { background: rgba(162, 155, 254, 0.18); color: #a29bfe; }

    /* 멤버 일괄 선택 */
    .bulk-actions {
      display: flex;
      gap: 6px;
    }

    .bulk-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bulk-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .team-filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* 멤버 추가 버튼 */
    .add-member-btn {
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #1dd1a1, #00cec9);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-member-btn:hover { opacity: 0.85; }

    /* 읽기 전용 모드 (잠금 상태) */
    body.readonly .input-row,
    body.readonly .add-restaurant-btn,
    body.readonly .add-member-btn,
    body.readonly .bulk-actions,
    body.readonly .team-filter-chips,
    body.readonly .clear-history-btn,
    body.readonly .item .remove-btn,
    body.readonly .member-item .remove-btn,
    body.readonly .member-item .dislike-count {
      display: none !important;
    }
    body.readonly .member-item input[type="checkbox"] {
      pointer-events: none;
      opacity: 0.5;
    }
    body.readonly .member-item .member-name {
      pointer-events: none;
      cursor: default;
    }
    body.readonly .member-item .member-name:hover {
      color: inherit;
    }

    .tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .tab:hover:not(.active) { color: rgba(255, 255, 255, 0.7); }

    .tab-content { display: none; flex-direction: column; gap: 12px; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    .panel h2 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    .input-row input::placeholder { color: rgba(255, 255, 255, 0.35); }
    .input-row input:focus { border-color: rgba(255, 255, 255, 0.4); }

    .add-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #5f27cd, #7c3aed);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover { opacity: 0.85; }

    .reset-btn {
      padding: 10px;
      border: 1px solid rgba(255, 71, 87, 0.4);
      border-radius: 12px;
      background: rgba(255, 71, 87, 0.1);
      color: #ff6b81;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .reset-btn:hover {
      background: rgba(255, 71, 87, 0.2);
      border-color: rgba(255, 71, 87, 0.6);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 4px;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .history-date {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .history-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 13px;
    }

    .history-entry .h-name {
      font-weight: 600;
      color: #f9ca24;
    }

    .history-entry .h-time {
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
    }

    .clear-history-btn {
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: transparent;
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .clear-history-btn:hover {
      color: #ff6b81;
      border-color: rgba(255, 71, 87, 0.4);
    }

    .items-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .items-list::-webkit-scrollbar { width: 4px; }
    .items-list::-webkit-scrollbar-track { background: transparent; }
    .items-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      font-size: 14px;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .item .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .item .name { flex: 1; }

    .item .remove-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
      padding: 0 2px;
    }

    .item .remove-btn:hover { color: #ff4757; }

    .empty-msg {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      padding: 30px 0;
    }

    /* 멤버 관리 */
    .member-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      font-size: 14px;
      animation: slideIn 0.25s ease;
    }

    .member-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #1dd1a1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .member-item .member-name {
      flex: 1;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
    }

    .member-item .member-name:hover {
      color: #ffa500;
    }

    .member-item .member-name.inactive {
      opacity: 0.4;
      text-decoration: line-through;
    }

    .member-item .dislike-count {
      font-size: 12px;
      color: #ff6b81;
      font-weight: 600;
      flex-shrink: 0;
      cursor: pointer;
      padding: 2px 4px;
    }

    .member-item .dislike-count.zero {
      color: rgba(255, 255, 255, 0.2);
    }

    .member-item .remove-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
      padding: 0 2px;
    }

    .member-item .remove-btn:hover { color: #ff4757; }

    .members-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .members-list::-webkit-scrollbar { width: 4px; }
    .members-list::-webkit-scrollbar-track { background: transparent; }
    .members-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    /* 결과 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal .label {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 12px;
    }

    .modal .winner {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #f9ca24, #f0932b, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
    }

    .modal .confetti-text {
      font-size: 32px;
      margin-bottom: 24px;
    }

    .modal .close-btn {
      padding: 12px 40px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: transparent;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* 비선호 설정 모달 */
    .dislike-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .dislike-modal-overlay.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    .dislike-modal {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 32px;
      width: 320px;
      max-height: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dislike-modal h3 {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }

    .dislike-modal .member-label {
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }

    .dislike-modal .member-label span {
      color: #ffa500;
      font-weight: 600;
    }

    .dislike-selected-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      background: rgba(255, 71, 87, 0.08);
      border: 1px solid rgba(255, 71, 87, 0.2);
      border-radius: 10px;
      min-height: 36px;
      align-items: center;
    }

    .dislike-selected-summary .selected-tag {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(255, 71, 87, 0.2);
      border: 1px solid rgba(255, 71, 87, 0.4);
      border-radius: 6px;
      color: #ff6b81;
      font-weight: 500;
    }

    .dislike-selected-summary .no-selected {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
    }

    .dislike-items-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      padding-right: 4px;
    }

    .dislike-items-list::-webkit-scrollbar { width: 4px; }
    .dislike-items-list::-webkit-scrollbar-track { background: transparent; }
    .dislike-items-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .dislike-check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dislike-check-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .dislike-check-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #ff6b6b;
      cursor: pointer;
    }

    .dislike-check-item label {
      cursor: pointer;
      flex: 1;
    }

    .dislike-modal .confirm-btn {
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #5f27cd, #7c3aed);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .dislike-modal .confirm-btn:hover { opacity: 0.85; }

    /* 반응형 */
    @media (max-width: 860px) {
      .app {
        flex-direction: column;
        padding: 24px 16px;
      }
      .wheel-container, canvas {
        width: 320px;
        height: 320px;
      }
      .panel { width: 100%; max-width: 380px; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="spinner-section">
    <div class="wheel-container">
      <div class="pointer" id="pointer"></div>
      <canvas id="wheel" width="840" height="840"></canvas>
    </div>
    <div class="filter-chips" id="filterChips"></div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">추첨하기</button>
    <div class="excluded-info" id="excludedInfo"></div>
  </div>

  <div class="panel">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://mggphdnqnleomihunmrz.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_XZ1-Z3RjmMmFOy72v7oh0A_HuhbE489';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const COLORS = [
    '#ff6b6b', '#5f27cd', '#00d2d3', '#f9ca24', '#ff9ff3',
    '#1dd1a1', '#54a0ff', '#ff6348', '#a29bfe', '#fd79a8',
    '#e17055', '#00cec9', '#6c5ce7', '#fdcb6e', '#e84393',
    '#0984e3', '#d63031', '#00b894', '#e056fd', '#f78fb3',
  ];

  let items = [];          // [{id, name}]
  let members = [];        // [{id, name, dislikes: [name, ...]}]
  let activeMembers = [];  // [member_id]
  let history = [];        // [{name, date, time}]
  let spinning = false;
  let currentAngle = 0;
  let editingMemberId = null;
  let currentGroup = null; // { slug, name }
  let selectedCategory = null;
  let selectedTeam = null;
  let categoryFilter = new Set();
  let restaurantCategories = [];
  let teamCategories = [];

  function renderChips(containerId, cats, onSelect, isFilter, allowAdd) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = isFilter ? 'filter-chip' : 'chip';
      btn.dataset.cat = c.name;
      btn.dataset.team = c.name;
      btn.textContent = c.name;
      btn.onclick = () => onSelect(c.name);
      if (isFilter && categoryFilter.has(c.name)) btn.classList.add('active');
      container.appendChild(btn);
    });
    // 그룹장만 추가 가능 (편집 모달과 필터에는 추가 버튼 없음)
    if (allowAdd && currentGroup && currentGroup.isOwner) {
      const addBtn = document.createElement('button');
      addBtn.className = 'chip';
      addBtn.style.borderStyle = 'dashed';
      addBtn.style.opacity = '0.7';
      addBtn.textContent = '+ 추가';
      const isTeam = containerId.includes('team') || containerId.includes('Team');
      addBtn.onclick = () => addNewCategory(isTeam ? 'team' : 'restaurant');
      container.appendChild(addBtn);
    }
  }

  function renderAllChips() {
    renderChips('categoryChips', restaurantCategories, selectCategory, false, true);
    renderChips('editCategoryChips', restaurantCategories, selectEditCategory, false, false);
    renderChips('teamChips', teamCategories, selectTeam, false, true);
    renderChips('editTeamChips', teamCategories, selectEditTeam, false, false);
    renderChips('filterChips', restaurantCategories, toggleCategoryFilter, true, false);
  }

  async function addNewCategory(type) {
    const name = (prompt(type === 'team' ? '새 팀 이름:' : '새 카테고리 이름:') || '').trim();
    if (!name) return;
    const emoji = (prompt('이모지 (선택, 기본: 🏷️):') || '🏷️').trim();

    const cats = type === 'team' ? teamCategories : restaurantCategories;
    if (cats.some(c => c.name === name)) {
      alert('이미 존재하는 카테고리입니다.');
      return;
    }

    const newCats = [...cats, { name, emoji }];
    const updateField = type === 'team' ? 'team_categories' : 'restaurant_categories';
    const { error } = await sb.from('groups').update({ [updateField]: newCats }).eq('slug', currentGroup.slug);
    if (error) { alert('추가 실패: ' + error.message); return; }

    if (type === 'team') teamCategories = newCats;
    else restaurantCategories = newCats;

    renderAllChips();
  }

  function selectCategory(cat) {
    selectedCategory = (selectedCategory === cat) ? null : cat;
    document.querySelectorAll('#categoryChips .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.cat === selectedCategory);
    });
  }

  function selectTeam(team) {
    selectedTeam = (selectedTeam === team) ? null : team;
    document.querySelectorAll('#teamChips .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.team === selectedTeam);
    });
  }

  function toggleCategoryFilter(cat) {
    if (categoryFilter.has(cat)) categoryFilter.delete(cat);
    else categoryFilter.add(cat);
    const chip = document.querySelector(`#filterChips .filter-chip[data-cat="${cat}"]`);
    if (chip) chip.classList.toggle('active', categoryFilter.has(cat));
    drawWheel();
  }

  async function loadData() {
    const slug = currentGroup.slug;
    const [restRes, memRes, histRes] = await Promise.all([
      sb.from('restaurants').select('*').eq('group_slug', slug).order('id'),
      sb.from('members').select('*').eq('group_slug', slug).order('id'),
      sb.from('history').select('*').eq('group_slug', slug).order('drawn_at', { ascending: false }).limit(100),
    ]);

    items = (restRes.data || []).map(r => ({ id: r.id, name: r.name, category: r.category }));

    const memberIds = (memRes.data || []).map(m => m.id);
    let dislikesData = [];
    if (memberIds.length > 0) {
      const { data } = await sb.from('member_dislikes').select('*').in('member_id', memberIds);
      dislikesData = data || [];
    }
    const dislikesByMember = {};
    dislikesData.forEach(d => {
      (dislikesByMember[d.member_id] ||= []).push(d.restaurant_id);
    });
    const idToName = Object.fromEntries(items.map(i => [i.id, i.name]));

    members = (memRes.data || []).map(m => ({
      id: m.id,
      name: m.name,
      team: m.team,
      dislikes: (dislikesByMember[m.id] || []).map(rid => idToName[rid]).filter(Boolean),
    }));
    activeMembers = (memRes.data || []).filter(m => m.is_active).map(m => m.id);

    history = (histRes.data || []).map(h => {
      const d = new Date(h.drawn_at);
      return {
        name: h.restaurant_name,
        date: d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }),
        time: d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }),
      };
    });
  }

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const CX = W / 2;
  const CY = H / 2;
  const R = W / 2 - 20;

  // 가중치 계산: 카테고리 필터 + 비선호 적용
  function getWeightedItems() {
    const active = members.filter(m => activeMembers.includes(m.id));
    const noFilter = categoryFilter.size === 0;

    return items.map(item => {
      // 카테고리 필터: 활성 시 매칭 안 되면 제외
      if (!noFilter) {
        const cat = item.category || '기타';
        if (!categoryFilter.has(cat)) {
          return { id: item.id, name: item.name, weight: 0, excluded: true };
        }
      }
      // 참여 멤버 비선호 체크
      if (active.length > 0 && active.some(m => m.dislikes.includes(item.name))) {
        return { id: item.id, name: item.name, weight: 0, excluded: true };
      }
      return { id: item.id, name: item.name, weight: 1, excluded: false };
    });
  }

  function drawWheel() {
    ctx.clearRect(0, 0, W, H);

    const weighted = getWeightedItems();
    const visible = weighted.filter(w => !w.excluded);
    const excludedCount = weighted.filter(w => w.excluded).length;

    // 제외 안내 텍스트 업데이트
    const infoEl = document.getElementById('excludedInfo');
    if (excludedCount > 0) {
      infoEl.textContent = `${excludedCount}개 식당 제외됨`;
    } else {
      infoEl.textContent = '';
    }

    if (visible.length === 0) {
      // 빈 상태 그리기
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.font = '600 28px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const msg = items.length === 0 ? '항목을 추가해주세요' : '모든 식당이 제외됨';
      ctx.fillText(msg, CX, CY);
      return;
    }

    // 가중치 합산
    const totalWeight = visible.reduce((sum, w) => sum + w.weight, 0);

    // 슬라이스 그리기 (가중치 비례 크기)
    let angleOffset = currentAngle;
    visible.forEach((item, i) => {
      const sliceAngle = (item.weight / totalWeight) * Math.PI * 2;
      const startAngle = angleOffset;
      const endAngle = angleOffset + sliceAngle;

      // 파이 조각
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.arc(CX, CY, R, startAngle, endAngle);
      ctx.closePath();
      const originalIndex = items.findIndex(i => i.id === item.id);
      ctx.fillStyle = COLORS[originalIndex % COLORS.length];
      ctx.fill();

      // 경계선
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 텍스트
      ctx.save();
      ctx.translate(CX, CY);
      ctx.rotate(startAngle + sliceAngle / 2);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const fontSize = visible.length <= 6 ? 26 : visible.length <= 10 ? 22 : 18;
      ctx.font = `700 ${fontSize}px -apple-system, sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;

      const textR = R * 0.62;
      const label = item.name.length > 8 ? item.name.slice(0, 7) + '…' : item.name;
      ctx.fillText(label, textR, 0);
      ctx.restore();

      angleOffset = endAngle;
    });

    // 중심 원
    ctx.beginPath();
    ctx.arc(CX, CY, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function renderItems() {
    const list = document.getElementById('itemsList');
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-msg">아직 추가된 항목이 없습니다</div>';
    } else {
      list.innerHTML = items.map((item, i) => `
        <div class="item">
          <span class="color-dot" style="background:${COLORS[i % COLORS.length]}"></span>
          <span class="name" onclick="openEditRestaurant(${item.id})" style="cursor:pointer;">${escapeHtml(item.name)}</span>
          ${item.category ? `<span class="category-badge" data-cat="${item.category}" onclick="openEditRestaurant(${item.id})" style="cursor:pointer;">${item.category}</span>` : ''}
          <button class="remove-btn" onclick="removeItem(${i})" title="삭제">&times;</button>
        </div>
      `).join('');
    }
    drawWheel();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function openAddRestaurantModal() {
    selectedCategory = null;
    document.querySelectorAll('#categoryChips .chip').forEach(c => c.classList.remove('active'));
    const input = document.getElementById('itemInput');
    input.value = '';
    document.getElementById('addRestaurantModal').classList.add('show');
    setTimeout(() => input.focus(), 50);
  }

  function closeAddRestaurantModal(e) {
    if (!e || e.target === e.currentTarget) {
      document.getElementById('addRestaurantModal').classList.remove('show');
    }
  }

  async function addItem() {
    const input = document.getElementById('itemInput');
    const name = input.value.trim();
    if (!name) return;
    const { data, error } = await sb.from('restaurants').insert({
      name,
      category: selectedCategory,
      group_slug: currentGroup.slug,
    }).select().single();
    if (error) {
      if (error.code === '23505') alert('이미 등록된 식당입니다.');
      else alert('추가 실패: ' + error.message);
      return;
    }
    items.push({ id: data.id, name: data.name, category: data.category });
    input.value = '';
    selectedCategory = null;
    document.querySelectorAll('#categoryChips .chip').forEach(c => c.classList.remove('active'));
    renderItems();
    document.getElementById('addRestaurantModal').classList.remove('show');
  }

  async function removeItem(index) {
    if (spinning) return;
    const removed = items[index];
    const { error } = await sb.from('restaurants').delete().eq('id', removed.id).eq('group_slug', currentGroup.slug);
    if (error) { alert('삭제 실패: ' + error.message); return; }
    items.splice(index, 1);
    members.forEach(m => {
      m.dislikes = m.dislikes.filter(d => d !== removed.name);
    });
    renderItems();
  }

  async function resetItems() {
    if (spinning) return;
    if (items.length === 0) return;
    if (!confirm('이 그룹의 모든 식당을 초기화하시겠습니까?')) return;
    const { error } = await sb.from('restaurants').delete().eq('group_slug', currentGroup.slug);
    if (error) { alert('초기화 실패: ' + error.message); return; }
    items = [];

  async function migrateLegacyData() {
    const legacyItems = JSON.parse(localStorage.getItem('spinnerItems') || '[]');
    const legacyMembers = JSON.parse(localStorage.getItem('spinnerMembers') || '[]');
    const legacyActive = JSON.parse(localStorage.getItem('spinnerActiveMembers') || '[]');
    const legacyHistory = JSON.parse(localStorage.getItem('spinnerHistory') || '[]');

    if (!confirm(`로컬 데이터를 Supabase로 이전합니다.\n식당 ${legacyItems.length}개, 멤버 ${legacyMembers.length}명, 이력 ${legacyHistory.length}건\n계속하시겠습니까?`)) return;

    try {
      const slug = currentGroup.slug;

      // 1. 식당 추가 (이름 중복 무시)
      const restaurantMap = Object.fromEntries(items.map(i => [i.name, i.id]));
      for (const name of legacyItems) {
        if (restaurantMap[name]) continue;
        const { data, error } = await sb.from('restaurants').insert({ name, group_slug: slug }).select().single();
        if (!error && data) {
          restaurantMap[name] = data.id;
        }
      }

      // 2. 멤버 추가 + 비선호 동기화
      for (const m of legacyMembers) {
        let memberId = members.find(em => em.name === m.name)?.id;
        if (!memberId) {
          const isActive = legacyActive.includes(m.id);
          const { data, error } = await sb.from('members').insert({ name: m.name, is_active: isActive, group_slug: slug }).select().single();
          if (error) continue;
          memberId = data.id;
        }
        if (m.dislikes && m.dislikes.length > 0) {
          const rows = m.dislikes
            .map(name => restaurantMap[name])
            .filter(Boolean)
            .map(rid => ({ member_id: memberId, restaurant_id: rid }));
          if (rows.length > 0) {
            await sb.from('member_dislikes').upsert(rows, { onConflict: 'member_id,restaurant_id' });
          }
        }
      }

      // 3. 이력 추가 (오래된 것부터)
      for (let i = legacyHistory.length - 1; i >= 0; i--) {
        const h = legacyHistory[i];
        await sb.from('history').insert({
          restaurant_name: h.name,
          active_members: [],
          group_slug: slug,
        });
      }

      // 4. localStorage 정리
      localStorage.removeItem('spinnerItems');
      localStorage.removeItem('spinnerMembers');
      localStorage.removeItem('spinnerActiveMembers');
      localStorage.removeItem('spinnerHistory');

      // 5. 다시 로드
      await loadData();
      renderItems();
      renderMembers();
      renderHistory();

      document.getElementById('importModal').classList.remove('show');
      alert('이전 완료!');
    } catch (e) {
      alert('이전 실패: ' + e.message);
    }
  }

  async function bulkAddItems() {

    const names = text.split('\n').map(s => s.trim()).filter(Boolean);

  }

  function spin() {
    const weighted = getWeightedItems();
    const visible = weighted.filter(w => !w.excluded);

    if (spinning || visible.length < 2) {
      if (visible.length < 2) alert('추첨 가능한 식당이 2개 이상이어야 합니다.');
      return;
    }

    spinning = true;
    document.getElementById('spinBtn').disabled = true;

    const totalWeight = visible.reduce((sum, w) => sum + w.weight, 0);

    // 가중치 기반 랜덤 선택
    let rand = Math.random() * totalWeight;
    let winnerIndex = 0;
    for (let i = 0; i < visible.length; i++) {
      rand -= visible[i].weight;
      if (rand <= 0) {
        winnerIndex = i;
        break;
      }
    }

    const winnerName = visible[winnerIndex].name;

    // 당첨 슬라이스의 중심 각도 계산 (가중치 기반)
    let angleToWinnerCenter = 0;
    for (let i = 0; i < winnerIndex; i++) {
      angleToWinnerCenter += (visible[i].weight / totalWeight) * Math.PI * 2;
    }
    angleToWinnerCenter += (visible[winnerIndex].weight / totalWeight) * Math.PI;

    // 포인터는 12시 방향(-π/2)에 위치
    const targetAngle = -Math.PI / 2 - angleToWinnerCenter;

    // 여러 바퀴 회전 + 목표 각도
    const fullSpins = 5 + Math.floor(Math.random() * 3);
    const totalRotation = fullSpins * Math.PI * 2 + (targetAngle - currentAngle);

    const startAngle = currentAngle;
    const endAngle = startAngle + totalRotation;
    const duration = 4000 + Math.random() * 1000;
    const startTime = performance.now();

    const pointer = document.getElementById('pointer');
    let lastSliceIndex = -1;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // ease-out cubic
      const eased = 1 - Math.pow(1 - progress, 3);

      currentAngle = startAngle + totalRotation * eased;
      drawWheel();

      // 포인터 바운스 (슬라이스 경계 통과 시)
      const pointerAngle = ((-currentAngle - Math.PI / 2) % (Math.PI * 2) + Math.PI * 4) % (Math.PI * 2);
      let accum = 0;
      let currentSliceIdx = 0;
      for (let i = 0; i < visible.length; i++) {
        accum += (visible[i].weight / totalWeight) * Math.PI * 2;
        if (pointerAngle < accum) {
          currentSliceIdx = i;
          break;
        }
      }
      if (currentSliceIdx !== lastSliceIndex) {
        lastSliceIndex = currentSliceIdx;
        pointer.classList.remove('bounce');
        void pointer.offsetWidth;
        pointer.classList.add('bounce');
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        currentAngle = endAngle;
        drawWheel();
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
        showResult(winnerName);
      }
    }

    requestAnimationFrame(animate);
  }

      active_members: activeMemberNames,

    history.unshift({
      name,
      date: now.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }),
      time: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }),
    });
    if (history.length > 100) history = history.slice(0, 100);
    renderHistory();

      return;
    }
    const grouped = {};
    history.forEach(h => {
      if (!grouped[h.date]) grouped[h.date] = [];
      grouped[h.date].push(h);
    });
    list.innerHTML = Object.entries(grouped).map(([date, entries]) => `
      <div>
        <div class="history-date">${date}</div>
        <div class="history-group">
          ${entries.map(e => `
            <div class="history-entry">
              <span class="h-name">${escapeHtml(e.name)}</span>

  // 그룹 관리
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('g');
    const incomingKey = params.get('k');

    if (!slug) {
      showLanding();
      return;
    }

    // 편집 링크로 들어왔다면 토큰 검증 후 localStorage에 저장
    if (incomingKey) {
      const { data: ok } = await sb.rpc('verify_owner', { p_slug: slug, p_token: incomingKey });
      if (ok) {
        localStorage.setItem('owner_' + slug, incomingKey);
      }
      // URL 정리
      history.replaceState(null, '', window.location.pathname + '?g=' + slug);
    }

    const { data, error } = await sb.from('groups').select('slug, name, owner_token_hash, restaurant_categories, team_categories').eq('slug', slug).maybeSingle();
    if (error || !data) {
      alert('그룹을 찾을 수 없습니다.\n새 그룹을 만들거나 다른 코드를 입력해주세요.');
      showLanding();
      return;
    }

    const hasOwnerLock = data.owner_token_hash !== null;
    const storedToken = localStorage.getItem('owner_' + slug);
    const isOwner = !hasOwnerLock || !!storedToken;
    currentGroup = { slug: data.slug, name: data.name, hasOwnerLock, isOwner, token: storedToken };

    restaurantCategories = data.restaurant_categories || [];
    teamCategories = data.team_categories || [];

    document.getElementById('groupNameDisplay').textContent = data.name + ' (' + data.slug + ')';
    document.getElementById('groupBar').style.display = 'flex';
    updateLockUI();
    applyEditMode();
    renderAllChips();

    try {
      await loadData();
    } catch (e) {
      console.error('데이터 로드 실패:', e);
      alert('데이터 로드 실패: ' + e.message);
    }
    renderItems();
    renderMembers();
  }

  function updateLockUI() {
    const lockBtn = document.getElementById('lockBtn');
    const shareEditBtn = document.getElementById('shareEditBtn');
    const groupIcon = document.getElementById('groupIcon');

    if (!currentGroup.hasOwnerLock) {
      // 그룹장 락 없음 (legacy) - 누구나 편집
      lockBtn.style.display = 'none';
      shareEditBtn.style.display = 'none';
      groupIcon.textContent = '👥';
      return;
    }

    lockBtn.style.display = '';
    if (currentGroup.isOwner) {
      lockBtn.textContent = '👑';
      lockBtn.title = '그룹장 (편집 가능) - 클릭 시 키 백업';
      groupIcon.textContent = '👑';
      shareEditBtn.style.display = '';
    } else {
      lockBtn.textContent = '🔒';
      lockBtn.title = '읽기 전용 - 클릭 시 그룹장 키로 잠금 해제';
      groupIcon.textContent = '👁';
      shareEditBtn.style.display = 'none';
    }
  }

  function applyEditMode() {
    document.body.classList.toggle('readonly', !currentGroup.isOwner);
  }

  async function toggleLock() {
    if (!currentGroup.hasOwnerLock) return;

    if (currentGroup.isOwner) {
      // 키 백업 안내
      const token = currentGroup.token;
      if (!token) {
        alert('이 브라우저에 그룹장 키가 없습니다. 다시 잠금 해제해주세요.');
        return;
      }
      const editLink = window.location.origin + window.location.pathname + '?g=' + currentGroup.slug + '&k=' + token;
      const ok = confirm('그룹장 키 (분실 시 권한 회복 불가):\n\n' + token + '\n\n확인을 누르면 편집 링크가 클립보드에 복사됩니다.');
      if (ok) {
        try {
          await navigator.clipboard.writeText(editLink);
          alert('편집 링크 복사됨:\n' + editLink);
        } catch {
          prompt('아래 편집 링크를 복사하세요:', editLink);
        }
      }
      return;
    }

    // 비-그룹장: 키 입력 받아 잠금 해제
    const token = prompt('그룹장 키를 입력하세요:');
    if (token === null || token.trim() === '') return;
    const trimmed = token.trim();
    const { data: ok, error } = await sb.rpc('verify_owner', {
      p_slug: currentGroup.slug,
      p_token: trimmed,
    });
    if (error) { alert('확인 실패: ' + error.message); return; }
    if (ok) {
      localStorage.setItem('owner_' + currentGroup.slug, trimmed);
      currentGroup.isOwner = true;
      currentGroup.token = trimmed;
      updateLockUI();
      applyEditMode();
      alert('편집 권한이 활성화되었습니다.');
    } else {
      alert('키가 틀렸습니다.');
    }
  }

  async function shareEditLink() {
    if (!currentGroup.isOwner || !currentGroup.token) return;
    const editLink = window.location.origin + window.location.pathname + '?g=' + currentGroup.slug + '&k=' + currentGroup.token;
    try {
      await navigator.clipboard.writeText(editLink);
      alert('⚠️ 편집 링크가 복사되었습니다.\n이 링크를 받은 사람은 편집 권한을 얻습니다.\n\n' + editLink);
    } catch {
      prompt('아래 편집 링크를 복사하세요 (받는 사람이 편집 권한 획득):', editLink);
    }
  }

  function showLanding() {
    document.getElementById('landingModal').classList.add('show');
  }

  function generateSlug() {
    return Math.random().toString(36).slice(2, 8);
  }

  async function createGroup() {
    const name = document.getElementById('newGroupName').value.trim();
    if (!name) { alert('그룹 이름을 입력해주세요.'); return; }

    for (let attempt = 0; attempt < 5; attempt++) {
      const slug = generateSlug();
      const { data, error } = await sb.rpc('create_group_as_owner', {
        p_slug: slug,
        p_name: name,
      });
      if (!error && data && data.length > 0) {
        const token = data[0].out_token;
        localStorage.setItem('owner_' + slug, token);
        alert('그룹이 생성되었습니다!\n\n그룹장 키 (분실 시 권한 회복 불가):\n' + token + '\n\n안전한 곳에 백업해두세요.\n다른 사람과 편집 권한을 공유하려면 그룹 바의 🔑 버튼을 사용하세요.');
        window.location.search = '?g=' + slug;
        return;
      }
      if (error && error.code !== '23505' && !String(error.message).includes('duplicate')) {
        alert('생성 실패: ' + error.message);
        return;
      }
    }
    alert('생성 실패. 다시 시도해주세요.');
  }

  async function joinGroup() {
    const raw = document.getElementById('joinGroupSlug').value.trim().toLowerCase();
    if (!raw) { alert('그룹 코드를 입력해주세요.'); return; }
    const slug = raw.replace(/[^a-z0-9]/g, '');
    const { data, error } = await sb.from('groups').select('slug').eq('slug', slug).maybeSingle();
    if (error || !data) {
      alert('해당 코드의 그룹이 없습니다.');
      return;
    }
    window.location.search = '?g=' + slug;
  }

  async function shareGroup() {
    const url = window.location.href;
    try {
      await navigator.clipboard.writeText(url);
      alert('공유 링크가 복사되었습니다!\n' + url);
    } catch {
      prompt('아래 링크를 복사하세요:', url);
    }
  }

  function leaveGroup() {
    if (!confirm('다른 그룹을 선택하시겠습니까?')) return;
    window.location.href = window.location.pathname;
  }

  init();
</script>

</body>
</html>
